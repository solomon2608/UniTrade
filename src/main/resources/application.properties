spring.application.name=UniTrade
# ===============================
# DATABASE CONNECTION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/unitrade?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=administrator
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
# This is the magic setting that automatically creates your database tables!
spring.jpa.hibernate.ddl-auto=update

# Shows the SQL queries Spring is writing for you in the console
spring.jpa.show-sql=true

# Formats the SQL in the console so it is easy to read
spring.jpa.properties.hibernate.format_sql=true

# Tells Hibernate to use the specific MySQL dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect